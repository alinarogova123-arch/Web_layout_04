<!DOCTYPE html>
<html>
<head>
  <title>Киностудия «ГОСТФильм»</title>
  <link rel="stylesheet" href="normalize.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css">
  <link rel="icon" href="media/favicon.png" type="image/png">
  <style>
    .player-button {
      cursor: pointer;
      color: white;
      background-color: transparent;
      border: #fff;
      font-size: 10pt;
      margin: 0pt;
      height: 30px;
      width: 25px;
    }
    .player-area {
      margin: 4px;
      background-color:black;
      width: 533px;
      height: 400px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,1);
    }
    .player-video {
      flex-grow: 1;
    }
    .player-button-area {
      display: flex;
      flex-direction: row;
      background-color: black;
    }
    .player-progress-video {
      font-size: 8pt;
      font-family: "Roboto", sans-serif;
      flex-grow: 1;
      color: white;
      display: flex;
      flex-direction: row;
      align-items: center;
    }
    .progress {
      flex-grow: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      background-color: black;
      margin: 6px;

    }
    .slider {
      background-color: red;
      border-radius: 2px;
      height: 3px;
    }
    .dot {
      transition-property: opacity;
      transition-duration: 300ms;
      transition-timing-function: ease-in;
      opacity: 0.0;
      margin-bottom: -1px;
      margin-left: -5px;
      border-style: solid;
      border-color: white;
      border-width: 2px;
      height: 5px;
      width: 5px;
      background-color: red;
      border-radius: 50%;
      display: inline-block;
    }
    .player-button-area:hover .dot {
      opacity: 1.0;
    }
  </style>
  <meta charset="utf-8">
</head>
<body>
  <div id="player" class="player-area">
    <div class="js-video-container player-video"></div>
      <!-- Here can be placed player controls: play and volume buttons -->
    <div class="player-button-area">
      <button class="js-play-button player-button" hidden>
        <i class="fa fa-play" aria-hidden="true"></i>
      </button>
      <button class="js-pause-button player-button" hidden>
        <i class="fa fa-pause" aria-hidden="true"></i>
      </button>
      <button class="js-volume-button player-button" hidden>
        <i class="fa fa-volume-off" aria-hidden="true"></i>
      </button>
      <button class="js-mute-button player-button" hidden>
        <i class="fa fa-volume-up" aria-hidden="true"></i>
      </button>
      <div class="player-progress-video">
        <div class="viewing-time">
          <span class="js-current-time"></span>
        </div>
        <div class="js-progress progress">
          <div class="js-progress-slider slider"></div>
          <div>
            <span class="dot"></span>
          </div>
        </div>
        <div class="video-duration">
          <span class="js-duration"></span>
        </div>
      </div>
      <button class="js-fullscreen-button player-button">
        <i class="fa fa-expand" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
  <script src="player.js"></script>

  <script type="text/javascript">
    createPlayer({elementId: 'player'});
  </script>

</body>
</html>
